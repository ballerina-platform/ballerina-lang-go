version: "2"

linters:
  default: standard
  settings:
    staticcheck:
      checks:
        # Default
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022

  disable:
    - unused
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: true
