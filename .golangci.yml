version: "2"

linters:
  default: standard
  settings:
    staticcheck:
      checks:
        # Default
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        # receiver name should be a reflection of its identity; don't use generic names such as "this" or "self"
        - -ST1006
        # this value of ... is never used
        - -SA4006
        # this result of append is never used, except maybe in other appends
        - -SA4010
        # Type assertion to current type
        - -S1040
        # empty branch
        - -SA9003

  disable:
    - unused
    - ineffassign
    - errcheck
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  fix: true
