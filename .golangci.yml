version: "2"

linters:
  default: standard
  enable:
    - depguard
  settings:
    depguard:
      rules:
        no-test-util-in-production:
          files:
            - "$all"
            - "!$test"
          deny:
            - pkg: "ballerina-lang-go/test_util"
              desc: "test_util is test-only; import only from *_test.go"
            - pkg: "ballerina-lang-go/test_util/testphases"
              desc: "test_util/testphases is test-only; import only from *_test.go"
    staticcheck:
      checks:
        # Default
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022

  disable:
    - unused
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
