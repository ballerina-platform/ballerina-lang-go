name: PR Benchmark Prepare

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]

permissions:
  contents: read

concurrency:
  group: benchmark-prepare-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark:
    name: Benchmark main vs PR head
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install hyperfine
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y hyperfine

      - name: Build benchmark tool
        working-directory: compiler-tools/benchmark
        run: go build -o ../../bin/benchmark .

      - name: Run benchmark
        run: |
          mkdir -p benchmark-output
          ./bin/benchmark \
            --runs 10 \
            --warmup 2 \
            --export-html benchmark-output/output.html \
            origin/main \
            HEAD \
            corpus/bench

      - name: Write benchmark metadata
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          jq -n \
            --argjson pr_number "$PR_NUMBER" \
            --arg head_sha "$HEAD_SHA" \
            --arg base_ref "$BASE_REF" \
            --arg head_ref "$HEAD_REF" \
            --arg head_repo_full_name "$HEAD_REPO" \
            '$ARGS.named' > benchmark-output/benchmark-meta.json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: |
            benchmark-output/output.html
            benchmark-output/benchmark-meta.json
          if-no-files-found: error
