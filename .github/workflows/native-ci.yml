name: Native CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ubuntu-build:
    name: Ubuntu Native Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine
          hyperfine --version

      - name: Run tests with coverage
        run: |
          set -euo pipefail

          go test -race -count=1 -timeout 30m -skip 'TestParseCorpusFiles|TestJBalUnitTests|TestJBalUnitBIRTests' \
            -coverpkg=./... -coverprofile=coverage.out -covermode=atomic ./...

          mkdir -p .cover/cli_executable
          BAL_GOCOVERDIR="$PWD/.cover/cli_executable" \
            go test -race -count=1 -timeout 30m -skip 'TestParseCorpusFiles|TestJBalUnitTests|TestJBalUnitBIRTests' ./...
          go tool covdata textfmt -i=.cover/cli_executable -o=coverage-cli-executable.out

          COVERAGE_FILES=("coverage.out" "coverage-cli-executable.out")
          while IFS= read -r gomod; do
            dir="$(dirname "$gomod")"
            if [ "$dir" = "." ]; then
              continue
            fi
            rel="${dir#./}"
            safe_base="${rel//\//-}"
            safe_hash="$(printf '%s' "$rel" | sha256sum | cut -c1-8)"
            safe="${safe_base}-${safe_hash}"
            out="$GITHUB_WORKSPACE/coverage-mod-$safe.out"
            integration_cov_dir="$GITHUB_WORKSPACE/.cover/${safe}_codecov"

            mkdir -p "$integration_cov_dir"
            echo "go test (coverage) in module $dir"
            (cd "$dir" && CODECOV_INTEGRATION_COVERDIR="$integration_cov_dir" \
              go test -race -count=1 -timeout 30m -skip 'TestParseCorpusFiles|TestJBalUnitTests|TestJBalUnitBIRTests' \
                -coverpkg=./... -coverprofile="$out" -covermode=atomic ./...)
            COVERAGE_FILES+=("$out")

            exec_out="$GITHUB_WORKSPACE/coverage-mod-${safe}-executable.out"
            if [ -d "$integration_cov_dir" ] && [ -n "$(find "$integration_cov_dir" -type f 2>/dev/null | head -n 1)" ]; then
              go tool covdata textfmt -i="$integration_cov_dir" -o="$exec_out"
              COVERAGE_FILES+=("$exec_out")
            fi
          done < <(find . -type f -name go.mod ! -path '*/vendor/*' | LC_ALL=C sort)

          printf -v COVERAGE_FILES_CSV '%s,' "${COVERAGE_FILES[@]}"
          echo "COVERAGE_FILES=${COVERAGE_FILES_CSV%,}" >> "$GITHUB_ENV"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ env.COVERAGE_FILES }}
          fail_ci_if_error: true

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l -s .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files detected:"
            echo "$unformatted"
            exit 1
          fi

  windows-build:
    name: Windows Native Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install hyperfine
        shell: pwsh
        run: |
          choco install hyperfine -y
          hyperfine --version

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail

          go test -race -count=1 -timeout 30m -skip 'TestParseCorpusFiles|TestJBalUnitTests|TestJBalUnitBIRTests' ./...

          while IFS= read -r gomod; do
            dir="$(dirname "$gomod")"
            if [ "$dir" = "." ]; then
              continue
            fi
            echo "go test in module $dir"
            (cd "$dir" && go test -race -count=1 -timeout 30m -skip 'TestParseCorpusFiles|TestJBalUnitTests|TestJBalUnitBIRTests' ./...)
          done < <(find . -type f -name go.mod ! -path '*/vendor/*' | LC_ALL=C sort)
