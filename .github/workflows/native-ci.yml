name: Native CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ubuntu-build:
    name: Ubuntu Native Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install Hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine

      - name: Run all modules (tests + coverage)
        run: python3 .github/scripts/run_native_tests.py --with-coverage

      - name: Run corpus benchmarks
        run: go test -run='^$' -bench=. -benchtime=1x -timeout 2h ./corpus

      - name: Collect coverage files
        id: coverage
        run: |
          mapfile -t files < <(find .artifacts/coverage -name '*.out' -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No coverage profiles generated" >&2
            exit 1
          fi
          (IFS=,; echo "files=${files[*]}" >> "$GITHUB_OUTPUT")

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ steps.coverage.outputs.files }}
          flags: native
          fail_ci_if_error: true

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l -s .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files detected:"
            echo "$unformatted"
            exit 1
          fi

  windows-build:
    name: Windows Native Build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Install Hyperfine
        shell: pwsh
        run: |
          choco install hyperfine -y

      - name: Run all modules
        shell: pwsh
        run: py -3 .github/scripts/run_native_tests.py
