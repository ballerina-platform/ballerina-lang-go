name: PR Benchmark

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    name: Benchmark main vs PR head
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine

      - name: Build benchmark tool
        working-directory: compiler-tools/benchmark
        run: go build -o ../../bin/benchmark .

      - name: Run benchmark
        run: |
          ./bin/benchmark \
            --runs 10 \
            --warmup 2 \
            --export-html compiler-tools/benchmark/output.html \
            origin/main \
            HEAD \
            corpus/benchmark

      - name: Update benchmark comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const MARKER = "<!-- benchmark-pr-comment -->";
            const HTML_PATH = "compiler-tools/benchmark/output.html";

            function extractTable(html) {
              const match = html.match(/<table\b[\s\S]*?<\/table>/i);
              if (!match) core.setFailed("No <table>...</table> found in benchmark output");
              return match?.[0];
            }

            function processTable(table) {
              return table
                .replace(/\sclass="[^"]*"/g, "")
                .replace(/<\/?span\b[^>]*>/g, "")
                .split("\n")
                .map((line) => line.trimStart())
                .join("\n")
                .trim()
                .replace(
                  /<td>\s*([\d.]+×)\s*±\s*([\d.]+)\s*([^\n<]+?)\s*<\/td>/g,
                  (_match, ratio, margin, winnerRef) => {
                    const winner = winnerRef.trim();
                    const winnerMsg = winner === "tie" ? "Both are equal" : winner;
                    return `<td>${ratio} ± ${margin}\n\n${winnerMsg}\n</td>`;
                  }
                );
            }

            function buildBody(table) {
              return [
                MARKER,
                "## Benchmark Results",
                "",
                table,
                "",
                "_Generated by benchmark workflow for `origin/main` vs `HEAD`._"
              ].join("\n");
            }

            async function findExistingComment(issueNumber) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                per_page: 100
              });
              return comments.find((c) => c.body?.includes(MARKER));
            }

            async function upsertComment(issueNumber, body) {
              const existing = await findExistingComment(issueNumber);
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body
                });
                core.info(`Updated benchmark comment: ${existing.id}`);
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  body
                });
                core.info("Created benchmark comment");
              }
            }

            const html = fs.readFileSync(HTML_PATH, "utf8");
            const table = extractTable(html);
            if (!table) return;
            const body = buildBody(processTable(table));
            await upsertComment(context.payload.pull_request.number, body);
