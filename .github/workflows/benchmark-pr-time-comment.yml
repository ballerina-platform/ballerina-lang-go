name: PR Benchmark Time Comment

on:
  workflow_run:
    workflows: [PR Benchmark Time Prepare]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-time-comment-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post time benchmark comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: benchmark-time-pr-*
          merge-multiple: true
          path: benchmark-artifact

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const MARKER = "<!-- benchmark-time-pr-comment -->";
            const LEGACY_MARKER = "<!-- benchmark-pr-comment -->";
            const meta = JSON.parse(fs.readFileSync("benchmark-artifact/benchmark-meta.json", "utf8"));
            const { pr_number: issueNumber, head_sha: artifactHeadSha } = meta;

            if (!issueNumber) core.setFailed("benchmark-meta.json missing pr_number");
            if (!artifactHeadSha) core.setFailed("benchmark-meta.json missing head_sha");

            // Bail out if a newer push has already superseded this run
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: issueNumber,
            });
            if (pr.head.sha !== artifactHeadSha) {
              core.info(`Skipping: artifact SHA ${artifactHeadSha} is not current PR head ${pr.head.sha}`);
              return;
            }

            function readIfExists(path) {
              return fs.existsSync(path) ? fs.readFileSync(path, "utf8") : "";
            }

            function extractTable(path, label) {
              const html = readIfExists(path);
              if (!html) return "";
              const tableMatch = html.match(/<table\b[\s\S]*?<\/table>/i);
              if (!tableMatch) throw new Error(`No <table> found in ${label} output`);
              return tableMatch[0]
                .replace(/\sclass="[^"]*"/g, "")
                .replace(/<\/?span\b[^>]*>/g, "")
                .split("\n").map(l => l.trimStart()).join("\n")
                .replace(
                  /<td>\s*([\d.]+×)\s*±\s*([\d.]+)\s*([^\n<]+?)\s*<\/td>/g,
                  (_, ratio, margin, winner) =>
                    `<td>${ratio} ± ${margin}\n\n${winner.trim() === "tie" ? "Both are equal" : winner.trim()}\n</td>`
                );
            }

            function section(title, tablePath, errorPath) {
              let table = "";
              try {
                table = extractTable(tablePath, title);
              } catch (e) {
                core.warning(`Failed to extract table for "${title}": ${e.message}`);
              }
              if (table) return [`## ${title}`, "", table];
              const error = readIfExists(errorPath);
              if (error) return [`## ${title}`, "", "```text", error.trim(), "```"];
              return [`## ${title}`, "", "```text", "No benchmark output was produced.", "```"];
            }

            const body = [
              MARKER,
              ...section("CPU Time Benchmark Results", "benchmark-artifact/output.html", "benchmark-artifact/time-error.txt"),
              "",
              "_Generated by benchmark workflow for `origin/main` vs `HEAD`._",
            ].join("\n");

            // Upsert: update existing marker comment or create a new one
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: issueNumber,
            });
            const existing = comments.find(c => c.body?.includes(MARKER) || c.body?.includes(LEGACY_MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issueNumber,
                body,
              });
              core.info("Created benchmark comment");
            }
