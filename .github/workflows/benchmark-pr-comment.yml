name: PR Benchmark Comment

on:
  workflow_run:
    workflows: [PR Benchmark Prepare]
    types: [completed]

permissions:
  actions: read
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-comment-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  comment:
    name: Post benchmark comment
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Download benchmark artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: benchmark-pr-*
          merge-multiple: true
          path: benchmark-artifact

      - name: Post or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const MARKER = "<!-- benchmark-pr-comment -->";
            const meta = JSON.parse(fs.readFileSync("benchmark-artifact/benchmark-meta.json", "utf8"));
            const { pr_number: issueNumber, head_sha: artifactHeadSha } = meta;

            if (!issueNumber) core.setFailed("benchmark-meta.json missing pr_number");
            if (!artifactHeadSha) core.setFailed("benchmark-meta.json missing head_sha");

            // Bail out if a newer push has already superseded this run
            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: issueNumber,
            });
            if (pr.head.sha !== artifactHeadSha) {
              core.info(`Skipping: artifact SHA ${artifactHeadSha} is not current PR head ${pr.head.sha}`);
              return;
            }

            // Extract and sanitise the <table> from the benchmark HTML
            const html = fs.readFileSync("benchmark-artifact/output.html", "utf8");
            const tableMatch = html.match(/<table\b[\s\S]*?<\/table>/i);
            if (!tableMatch) { core.setFailed("No <table> found in benchmark output"); return; }

            const table = tableMatch[0]
              .replace(/\sclass="[^"]*"/g, "")
              .replace(/<\/?span\b[^>]*>/g, "")
              .split("\n").map(l => l.trimStart()).join("\n")
              .replace(
                /<td>\s*([\d.]+×)\s*±\s*([\d.]+)\s*([^\n<]+?)\s*<\/td>/g,
                (_, ratio, margin, winner) =>
                  `<td>${ratio} ± ${margin}\n\n${winner.trim() === "tie" ? "Both are equal" : winner.trim()}\n</td>`
              );

            const body = [
              MARKER,
              "## Benchmark Results",
              "",
              table,
              "",
              "_Generated by benchmark workflow for `origin/main` vs `HEAD`._",
            ].join("\n");

            // Upsert: update existing marker comment or create a new one
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo,
              issue_number: issueNumber,
            });
            const existing = comments.find(c => c.body?.includes(MARKER));

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issueNumber,
                body,
              });
              core.info("Created benchmark comment");
            }
